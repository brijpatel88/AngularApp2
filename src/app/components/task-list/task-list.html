<div class="task-container">
  <h2>Task Tracker</h2>

  <div class="form-row">
    <input
      type="text"
      [(ngModel)]="newTaskTitle"
      placeholder="Enter a task"
    />

    <button class="add-btn" (click)="addTask()">Add Task</button>

    <button class="clear-btn" (click)="clearTasks()">Clear All</button>
  </div>

  <ul>
    <li *ngFor="let task of tasks$ | async">
      <span class="task-title" [appCompleted]="task.completed">
        {{ task.title | truncate:30 }}
      </span>

      <button class="done-btn" (click)="toggleTask(task.id)">✔</button>
    </li>
  </ul>

  <p class="empty-message" *ngIf="(tasks$ | async)?.length === 0">
    No tasks yet. Add your first task.
  </p>
</div>
